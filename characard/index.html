<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Character Card">
<meta property="og:description" content="Aquaman saving the day!">
<meta property="og:url" content="https://yourURLofPage.here">
<meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Character Card">
<meta name="twitter:description" content="Aquaman saving the day!">
<meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

<!-- One favicon (ICO works everywhere) -->
<link rel="icon" href="/favicon.ico">

<!-- One Apple Touch Icon (iOS home screen) -->
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Card</title>
<script src="script.js"></script>
<link rel="stylesheet" href="styles.css">


</head>

<body>

<div class="card">
  <img id="characterImage" class="image" src="images/aquaman7.jpg" alt="Character Image">

  <div class="name" id="characterName"></div>

  <div class="stats">
    <p><strong>Class:</strong> <span id="characterClass"></span></p>
    <p><strong>Level:</strong> <span id="characterLevel"></span></p>
    <p><strong>Health:</strong> <span id="characterHealth"></span></p>
  </div>

  <div class="buttons">
    <button onclick="character.attacked()">Attacked</button>
    <button onclick="character.levelUp()">Level Up</button>
  </div>
</div>



</body>
</html>
