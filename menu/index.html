<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1 id="title">🍕 CITY MENU</h1>
    <button id="langBtn">AL</button>
  </header>

  <div class="tabs">
    <button class="active" onclick="filterMenu('all', event)" data-en="All" data-al="Të gjitha">All</button>
    <button onclick="filterMenu('pizza', event)" data-en="Pizza" data-al="Pica">Pizza</button>
    <button onclick="filterMenu('sandwich', event)" data-en="Sandwich" data-al="Sanduiç">Sandwich</button>
    <button onclick="filterMenu('salad', event)" data-en="Salads" data-al="Sallata">Salads</button>
    <button onclick="filterMenu('drink', event)" data-en="Drinks" data-al="Pije">Drinks</button>
    <button onclick="filterMenu('antipasta', event)" data-en="Antipasta" data-al="Antipasta">Antipasta</button>
  </div>

  <div class="image-viewer">
    <img id="product-image" src="" alt="Selected menu item image">
  </div>

  <div id="menu" class="menu"></div>

  <script src="script.js"></script>
</body>
</html>
