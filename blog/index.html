<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Read For Fun</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="top-line"></div>

    <header class="site-header">
      <h1 class="site-title">Kids Read For Fun</h1>
      <div class="title-line"></div>

      <nav class="site-nav" aria-label="Primary">
        <a href="#">About</a>
        <a href="#">Archive</a>
        <a href="#">Search</a>
      </nav>
      <div class="nav-line"></div>
    </header>

    <main class="content">
      <aside class="meta" aria-label="Post details">
        <div class="meta-block">
          <div class="meta-date">July 5, 2022</div>
          <div class="meta-age">10-14</div>
          <div class="meta-genre">Fantasy</div>
          <div class="meta-stars" aria-label="Rating: 4 out of 5">
            <span>★</span><span>★</span><span>★</span><span>★</span><span class="off">★</span>
          </div>
        </div>
      </aside>

      <article class="post">
        <div class="post-grid">
          <div class="divider"></div>

          <div class="post-body">
            <h2 class="post-title">Septimus Heap Book One: Magyk</h2>

            <div class="cover-wrap">
              <img class="cover" src="https://upload.wikimedia.org/wikipedia/en/5/5f/Magkycover2.jpg" alt="Cover of Septimus Heap Book One: Magyk" />
            </div>

            <p class="post-text">
              If you enjoy stories about seventh sons of seventh sons and magyk this is the book for you.
            </p>
          </div>
        </div>
      </article>
    </main>

    <div class="bottom-line"></div>

    <footer class="site-footer">
      <div class="author">Jane Doe</div>
    </footer>
  </div>
</body>
</html>
